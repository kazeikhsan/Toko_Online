  <!-- Simple coffee cup icon in center -->
  <g transform="translate(120, 120)">
    <!-- Cup body -->
    <path d="M -8 -5 L -8 8 Q -8 12 -4 12 L 8 12 Q 12 12 12 8 L 12 -5" stroke="black" stroke-width="1.5" fill="none"/>
