    <path d="M 14 0 Q 20 0 20 6" stroke="black" stroke-width="1.5" fill="none"/>
    <!-- Coffee steam -->
    <path d="M -4 -12 Q -2 -14 0 -12" stroke="black" stroke-width="1" fill="none"/>
    <path d="M 4 -12 Q 6 -14 8 -12" stroke="black" stroke-width="1" fill="none"/>
